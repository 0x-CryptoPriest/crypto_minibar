services:
  issuer:
    build:
      context: ./issuer
    container_name: market-feed-issuer
    environment:
      TOKEN_ISSUER_ADMIN_PASSWORD: ${CENTRIFUGO_ADMIN_PASSWORD}
      TOKEN_ISSUER_DB_PATH: /data/token_issuer.db
      TOKEN_ISSUER_PUBLIC_WEBSOCKET_URL: ${TOKEN_ISSUER_PUBLIC_WEBSOCKET_URL:-wss://blackphoenix.online/connection/websocket}
      TOKEN_ISSUER_JWT_TTL_SECONDS: ${TOKEN_ISSUER_JWT_TTL_SECONDS:-900}
      TOKEN_ISSUER_SESSION_TTL_SECONDS: ${TOKEN_ISSUER_SESSION_TTL_SECONDS:-86400}
      CENTRIFUGO_CLIENT_TOKEN_HMAC_SECRET_KEY: ${CENTRIFUGO_ADMIN_SECRET}
      CENTRIFUGO_CLIENT_TOKEN_ISSUER: ${CENTRIFUGO_CLIENT_TOKEN_ISSUER:-blackphoenix-market-feed}
      CENTRIFUGO_CLIENT_TOKEN_AUDIENCE: ${CENTRIFUGO_CLIENT_TOKEN_AUDIENCE:-blackphoenix-market-feed}
    ports:
      - "127.0.0.1:8090:8090"
    volumes:
      - issuer_data:/data
    restart: unless-stopped

  centrifugo:
    image: centrifugo/centrifugo:v6
    container_name: market-feed-centrifugo
    command: centrifugo -c /centrifugo/config.json
    environment:
      CENTRIFUGO_HTTP_API_KEY: ${CENTRIFUGO_HTTP_API_KEY}
      CENTRIFUGO_ADMIN_PASSWORD: ${CENTRIFUGO_ADMIN_PASSWORD}
      CENTRIFUGO_ADMIN_SECRET: ${CENTRIFUGO_ADMIN_SECRET}
      CENTRIFUGO_CLIENT_ALLOW_ANONYMOUS_CONNECT_WITHOUT_TOKEN: "false"
      CENTRIFUGO_CLIENT_TOKEN_HMAC_SECRET_KEY: ${CENTRIFUGO_ADMIN_SECRET}
      CENTRIFUGO_CLIENT_TOKEN_ISSUER: ${CENTRIFUGO_CLIENT_TOKEN_ISSUER:-blackphoenix-market-feed}
      CENTRIFUGO_CLIENT_TOKEN_AUDIENCE: ${CENTRIFUGO_CLIENT_TOKEN_AUDIENCE:-blackphoenix-market-feed}
      CENTRIFUGO_CLIENT_TOKEN_USER_ID_CLAIM: sub
    expose:
      - "8000"
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./centrifugo/config.json:/centrifugo/config.json:ro
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    restart: unless-stopped

  adapter:
    image: market-feed-adapter:latest
    build:
      context: ./adapter
      network: host
    network_mode: host
    container_name: market-feed-adapter
    environment:
      ADAPTER_CONFIG_PATH: /app/config/config.json
      ALLTICK_TOKEN: ${ALLTICK_TOKEN}
      CENTRIFUGO_HTTP_API_KEY: ${CENTRIFUGO_HTTP_API_KEY}
    volumes:
      - ./adapter/config.json:/app/config/config.json:ro
    depends_on:
      - centrifugo
    restart: unless-stopped

  caddy:
    image: caddy:2.8.4
    container_name: market-feed-caddy
    depends_on:
      - issuer
      - centrifugo
    network_mode: host
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./web:/srv/web:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped

volumes:
  issuer_data:
  caddy_data:
  caddy_config:
