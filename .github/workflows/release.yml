name: Release

# Build the .app + .dmg on a macOS runner. Pushing a version tag (e.g. v1.2.0)
# publishes the DMG to a GitHub Release; manual runs just upload it as an artifact.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select latest stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Show toolchain
        run: swift --version

      - name: Build app and DMG
        run: ./scripts/make_app.sh

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: MiniC-dmg
          path: MiniC.dmg

      - name: Publish to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: MiniC.dmg
          fail_on_unmatched_files: true
          generate_release_notes: true
